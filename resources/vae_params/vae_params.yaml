# VAE params for training dual arm data

no_beams                 : 3
beam_latent_dim          : 25
no_hands                 : 2
robot_latent_dim         : 25
no_classifier_nodes      : 5      
action_dim               : 0
state_dim                : 5
no_inputs                : 1
no_outputs               : 1
in_path                  : "model_params/independent_classifier/vae_0/vae_epoch_1000.pt"
out_dir                  : "model_params/independent_classifier/vae_0" 
data_freq                : 50.0
enc_freq                 : 50.0 
dec_freq                 : 50.0
no_recurrent_steps       : 1 
model_width              : 256 
batch_first              : True 
cuda                     : True
split_encoder            : False


# Beam Params
pos_lims:
    - 0.60
    - 0.60
    - 0.08

# Beam Params
robot_lims:
    - 1.00
    - 1.00
    - 0.25 

# Graph nodes to include in the data
graph_nodes:
    - "robot_left_hand"
    - "robot_right_hand"
    - "l_beam_1"
    - "l_beam_2"
    - "l_pin_A"
